<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style.css">
    <title>Halaman Login</title>
  </head>
  <body class="bg-amber-400 font-Poppins">
    <div class="card flex flex-col items-center justify-between w-max h-max border-2 rounded-xl p-4 gap-3">
        <h1 class="text-4xl font-bold">Login</h1>
        <div class="flex flex-col">
          <label for="username">Username</label>
          <input class="border-2 p-1 rounded-md" type="text" name="username" id="username" required>
        </div>
        <div class="flex flex-col">
          <label for="password">Password</label>
          <input class="border-2 p-1 rounded-md" type="password" name="password" id="password" required>
        </div>
        <button id="submit" class="p-2 w-full border-amber-100 border-2 bg-amber-100 hover:bg-amber-400 rounded-xl" type="submit">Login</button>
      <p>Belum punya akun? <a class="underline" href="/daftar/">Daftar disini</a></p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
